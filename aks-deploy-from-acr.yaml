trigger:
- main

pool:
  vmImage: 'ubuntu-latest'

variables:
  azureSubscription: 'azure-service-connection'
  resourceGroupName: 'arun1-rg'
  aksClusterName: 'javacluster'
  acrName: 'myacrname'
  imageRepository: 'springboot-app'
  imageTag: 'latest'
  namespace: 'default'
  deploymentName: 'springboot-deployment'
  containerName: 'springboot-container'

stages:
- stage: DeployToAKS
  displayName: 'Deploy to AKS'
  jobs:
  - job: Deploy
    displayName: 'Deploy image from ACR to AKS'
    steps:

    - task: AzureCLI@2
      displayName: 'Get AKS credentials'
      inputs:
        azureSubscription: '$(azureSubscription)'
        scriptType: 'bash'
        scriptLocation: 'inlineScript'
        inlineScript: |
          az aks get-credentials \
            --resource-group $(resourceGroupName) \
            --name $(aksClusterName) \
            --overwrite-existing

          kubectl get nodes

    - task: AzureCLI@2
      displayName: 'Deploy image from ACR to AKS'
      inputs:
        azureSubscription: '$(azureSubscription)'
        scriptType: 'bash'
        scriptLocation: 'inlineScript'
        inlineScript: |
          IMAGE_NAME=$(acrName).azurecr.io/$(imageRepository):$(imageTag)

          echo "Using image: $IMAGE_NAME"

          kubectl set image deployment/$(deploymentName) \
            $(containerName)=$IMAGE_NAME \
            -n $(namespace)

          kubectl rollout status deployment/$(deploymentName) -n $(namespace)
